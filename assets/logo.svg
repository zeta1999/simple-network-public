<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="st" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="96" fill="#0d1b2a"/>
  <!-- edges -->
  <g stroke="#72efdd" stroke-width="4" stroke-linecap="round" opacity="0.8">
    <line x1="100" y1="100" x2="58" y2="62"/>
    <line x1="100" y1="100" x2="146" y2="60"/>
    <line x1="100" y1="100" x2="60" y2="146"/>
    <line x1="100" y1="100" x2="148" y2="140"/>
  </g>
  <!-- peer nodes -->
  <g fill="#0d1b2a" stroke="#72efdd" stroke-width="4">
    <circle cx="58" cy="62" r="12"/>
    <circle cx="146" cy="60" r="12"/>
    <circle cx="60" cy="146" r="12"/>
    <circle cx="148" cy="140" r="12"/>
  </g>
  <!-- secure hub with keyhole (PQC) -->
  <circle cx="100" cy="100" r="23" fill="url(#st)"/>
  <circle cx="100" cy="95" r="5" fill="#0d1b2a"/>
  <rect x="97.5" y="98" width="5" height="11" rx="2.5" fill="#0d1b2a"/>
</svg>
